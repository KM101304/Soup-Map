name: SoupMap
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    exactVersion: 2.42.0
  MapboxMaps:
    url: https://github.com/mapbox/mapbox-maps-ios.git
    from: 11.0.0
targets:
  SoupMap:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoupMap
    info:
      path: SoupMap/Info.plist
    entitlements:
      path: SoupMap/SoupMap.entitlements
    settings:
      base:
        PRODUCT_NAME: SoupMap
        PRODUCT_BUNDLE_IDENTIFIER: $(SOUPMAP_BUNDLE_ID)
        PRODUCT_DISPLAY_NAME: SoupMap
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        INFOPLIST_KEY_CFBundleDisplayName: SoupMap
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
      - package: MapboxMaps
        product: MapboxMaps
  SoupMapTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoupMapTests
    dependencies:
      - target: SoupMap
    settings:
      base:
        SWIFT_VERSION: 5.10
